<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=block"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile_responsive.css">
    <link rel="shortcut icon" href="assets/logo.jpg" type="image/x-icon">
    <link rel="icon" href="assets/logo.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-top: 10px solid var(--primary);
            padding: 40px;
            text-align: left;
        }

        .form-container h1 {
            font-family: 'Syne', sans-serif;
            color: var(--text);
            margin-bottom: 20px;
            font-size: 2.8rem;
            line-height: 1.1;
        }

        .form-container p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            color: var(--text);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(168, 28, 38, 0.1);
        }

        .submit-btn {
            background-color: var(--primary);
            color: white;
            padding: 18px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(168, 28, 38, 0.3);
        }

        .submit-btn:hover {
            background-color: #000;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .inscription-section {
            padding-top: 160px;
            padding-bottom: 100px;
            background: var(--bg);
            min-height: 100vh;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center; color: black;">
                    <img src="assets/logo.jpg" alt="Logo">
                    <span>LA CONNEXION</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html#mission">Mission</a></li>
                <li><a href="planning.html">Planning</a></li>
                <li><a href="impact.html">Impact</a></li>
                <li><a href="evenements.html">Événements</a></li>
                <li><a href="reseaux.html">Nos Réseaux</a></li>
                <li><a href="inscription.html" class="active">Inscription</a></li>

                <li><a href="https://www.helloasso.com/associations/la-connexion-nanterre/formulaires/2"
                        class="cta-btn">Nous Soutenir 🔥</a></li>
            </ul>
            <div class="burger">
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </div>
    </nav>

    <!-- Desktop Floating CTA -->
    <a href="https://www.helloasso.com/associations/la-connexion-nanterre/formulaires/2" class="floating-cta"
        target="_blank">Nous Soutenir 🔥</a>

    <!-- Inscription Section -->
    <section class="inscription-section">
        <div class="container">
            <div class="form-container">
                <h1>Pré-Inscription</h1>
                <p>Remplissez ce formulaire d'inscription en ligne pour réserver votre place.</p>
                <form id="inscription-form">
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                    </div>

                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>
                    </div>

                    <div class="form-group">
                        <label for="tranche">Tranche d'âge</label>
                        <select id="tranche" name="tranche" required>
                            <option value="" disabled selected>Sélectionner une tranche d'âge</option>
                            <option value="Kids (6/9 ans)">KIDS (6/9 ans)</option>
                            <option value="Kids/Ados (10/14 ans)">KIDS / ADOS (10/14 ans)</option>
                            <option value="Adultes">ADULTES</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">Soumettre l'inscription</button>
                    <div id="form-msg" style="margin-top: 15px; font-weight: 600; text-align: center; display: none;">
                    </div>
                </form>

                <script>
                    const scriptURL = 'https://script.google.com/macros/s/AKfycbzGy_a7dBchzw_8xnh-IZYHMmRu-1KQh5x2RottjssnmzCyCEB0rCZ_Gt2xS2UZtofSmw/exec';
                    const form = document.getElementById('inscription-form');
                    const btn = document.getElementById('submit-btn');
                    const msg = document.getElementById('form-msg');

                    form.addEventListener('submit', e => {
                        e.preventDefault();
                        btn.disabled = true;
                        btn.innerHTML = "Envoi en cours... ⏳";
                        msg.style.display = "none";

                        // Using no-cors mode is essential for Google Apps Script Web Apps
                        fetch(scriptURL, {
                            method: 'POST',
                            body: new FormData(form),
                            mode: 'no-cors'
                        }).catch(error => console.error('Erreur réseau:', error));

                        // Faux délai d'attente pour une meilleure sensation utilisateur, puisque Google est lent
                        setTimeout(() => {
                            msg.style.display = "block";
                            msg.style.color = "#4CAF50"; // Green
                            msg.innerHTML = "✅ Merci ! Votre pré-inscription a bien été reçue.";
                            form.reset();
                            btn.innerHTML = "Soumettre l'inscription";
                            btn.disabled = false;
                        }, 1200);
                    })
                </script>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container footer-flex">
            <div class="brand">
                <h3>LA CONNEXION</h3>
                <p>Nanterre, France 🇫🇷</p>
            </div>
            <div class="creator">
                <p style="color: black;">Site réalisé par Yassine Varichon 🧑‍🍳</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
